on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      deploy_prod:
        description: 'Deploy to production?'
        required: true
        type: boolean
        default: false

jobs:
  deploy-dev:
    if: github.event_name == 'push'
    uses: ./.github/workflows/.deploy-template.yml
    with:
      environment: dev
      secrets: inherit
